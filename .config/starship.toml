# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# format
format = """$all$os$character"""

# Inserts a blank line between shell prompts
add_newline = false

# Timeout for shell command
command_timeout = 100000

# color palette
palette = 'catppuccin_mocha'

continuation_prompt = '[пҒ”пҒ” ](bold blue)' # duh

[status]
format = "[оӮ¶](bg)[$symbol$status]($style)[оӮҙ](bg) "
symbol = "вқҢ"
success_symbol = ""
not_executable_symbol = "рҹҡ«"
not_found_symbol = "рҹ”Қ"
sigint_symbol = "рҹ§ұ"
signal_symbol = "вҡЎ"
style = "bg:bg fg:red"
map_symbol = true
recognize_signal_code = true
pipestatus = true
pipestatus_separator = "|"
disabled = false

[sudo]
format = "[оӮ¶](bg)[$symbol]($style)[оӮҙ](bg) "
symbol = "рҹ§ҷ"
style = "bg:bg"
allow_windows = true
disabled = false

[username]
style_user = 'bg:bg fg:blue'
style_root = 'bg:bg fg:red'
format = "[оӮ¶](bg)[пҖҮ $user]($style)[оӮҙ](bg) "
disabled = false
show_always = true

[character] # The name of the module we are configuring is 'character'
success_symbol = '[пҒ”](bold green)' # The 'success_symbol' segment is being set to 'вқҜ' with the color 'bold green'
error_symbol = "[пҒ”](bold red)"
vimcmd_symbol = "[пҒ“](bold blue)"
vimcmd_visual_symbol = "[пҒ“](bold yellow)"
vimcmd_replace_symbol = "[пҒ“](bold purple)"
vimcmd_replace_one_symbol = "[пҒ“](bold purple)"
disabled = false

[directory]
format = "[оӮ¶](blue)[$path]($style)[оӮҙ](blue) "
truncation_length = 3
style = "bg:blue fg:bg"
read_only = " у°Ңҫ"

